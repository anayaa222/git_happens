# render.yaml — Render.com deployment configuration
services:
  - type: web
    name: hospital-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DB_NAME
        value: hospital_db
      - key: MONITORING_INTERVAL_MINUTES
        value: "10"
